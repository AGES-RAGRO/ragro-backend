spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gearheads}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show_sql: true
    properties:
      hibernate:
        format_sql: true

  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

  security:
    oauth2:
      client:
        registration:
          cognito:
            client-name: Cognito
            client-id: ${AWS_COGNITO_CLIENT_ID}
            client-secret: ${AWS_COGNITO_CLIENT_SECRET}
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            redirect-uri: ${AWS_COGNITO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/cognito}
            scope: openid,email,phone
      provider:
        cognito:
          issuer-uri: ${AWS_COGNITO_ISSUER_URI}
          user-name-attribute: cognito:username
      resourceserver:
        jwt:
          issuer-uri: ${AWS_COGNITO_ISSUER_URI}

aws:
  cognito:
    domain: ${AWS_COGNITO_DOMAIN:https://your-cognito-domain.auth.us-east-1.amazoncognito.com}
    logout-uri: ${AWS_COGNITO_LOGOUT_URI:http://localhost:8080/}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    use-root-path: true

server:
  error:
    include-message: always