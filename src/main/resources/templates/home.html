<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragro - Cognito Login</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1f2937;
        }

        .container {
            max-width: 860px;
            margin: 5rem auto;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 14px 38px rgba(15, 23, 42, 0.12);
            padding: 2rem;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
        }

        .actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.4rem;
            flex-wrap: wrap;
        }

        .button {
            text-decoration: none;
            border: 0;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }

        .button-primary {
            background: #0f766e;
            color: #ffffff;
        }

        .button-danger {
            background: #dc2626;
            color: #ffffff;
        }

        .card {
            margin-top: 1.5rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1rem;
        }

        .label {
            font-weight: 700;
            min-width: 90px;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .container {
                margin: 1rem;
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
<main class="container">
    <h1>Ragro Authentication</h1>
    <p>Spring Security OAuth2 login integrated with AWS Cognito.</p>

    <div sec:authorize="isAnonymous()" class="actions">
        <a class="button button-primary" th:href="@{/oauth2/authorization/cognito}">Login with Cognito</a>
    </div>

    <div sec:authorize="isAuthenticated()">
        <div class="actions">
            <form th:action="@{/logout}" method="post">
                <button class="button button-danger" type="submit">Logout</button>
            </form>
        </div>

        <section class="card">
            <h2>Authenticated User</h2>
            <p><span class="label">Name:</span> <span sec:authentication="name">unknown</span></p>
            <p><span class="label">Principal:</span> <span sec:authentication="principal.attributes['cognito:username']">unknown</span></p>
            <p><span class="label">Authorities:</span> <span sec:authentication="authorities">[]</span></p>
            <p><span class="label">Email:</span> <span sec:authentication="principal.attributes['email']">not provided</span></p>
        </section>
    </div>
</main>
</body>
</html>
