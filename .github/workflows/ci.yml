name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  packages: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-22.04
    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ragro
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ragro
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: |
          mvn --batch-mode --no-transfer-progress test

      - name: Run Checkstyle
        run: |
          mvn --batch-mode --no-transfer-progress checkstyle:check

      - name: Run SpotBugs
        run: |
          mvn --batch-mode --no-transfer-progress spotbugs:check

  docker-build-scan:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: [backend-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Compose
        run: docker compose version

      - name: Start services
        run: docker compose -f docker-compose.test.yml --env-file .env.test up -d --build

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.test.yml --env-file .env.test down --volumes

      - name: Clean up failed images
        if: failure()
        run: |
          echo "Cleaning up failed images..."
          docker image prune -f
          docker volume prune -f
          echo "Cleanup completed"

  mirror-to-gitlab:
    name: Mirror to GitLab
    runs-on: ubuntu-22.04
    needs: [docker-build-scan]

    #Só executa em push na main (não roda em PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@tools.ages.pucrs.br/ragro/ragro-backend.git
          git push gitlab main --force