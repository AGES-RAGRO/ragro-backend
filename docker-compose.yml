version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ragro-postgres
    environment:
      POSTGRES_DB: gearheads
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/00-create-keycloak-db.sh:/docker-entrypoint-initdb.d/00-create-keycloak-db.sh
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragro-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ragro-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HTTP_PORT: 8180
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/ragro-realm.json:/opt/keycloak/data/import/ragro-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ragro-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragro-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gearheads
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      KEYCLOAK_SERVER_URL: http://keycloak:8180
      KEYCLOAK_PUBLIC_URL: http://localhost:8180
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/ragro
      KEYCLOAK_JWK_SET_URI: http://keycloak:8180/realms/ragro/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    networks:
      - ragro-network

volumes:
  postgres_data:

networks:
  ragro-network:
    driver: bridge
