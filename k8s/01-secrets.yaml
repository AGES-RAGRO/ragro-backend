# =============================================================================
# SECRET
# =============================================================================
# No docker-compose.yml, as senhas ficam em texto plano no "environment:".
# No Kubernetes, usamos Secrets para armazenar dados sensíveis (senhas, tokens).
#
# Os valores aqui estão em base64. Para codificar:
#   echo -n "postgres" | base64  -->  cG9zdGdyZXM=
#   echo -n "admin" | base64     -->  YWRtaW4=
#
# IMPORTANTE: Em produção, use ferramentas como Sealed Secrets ou Vault.
# base64 NÃO é criptografia, é apenas encoding!
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ragro
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=         # "postgres" em base64
  POSTGRES_PASSWORD: cG9zdGdyZXM=     # "postgres" em base64
  POSTGRES_DB: Z2VhcmhlYWRz           # "gearheads" em base64
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: ragro
type: Opaque
data:
  KEYCLOAK_ADMIN: YWRtaW4=            # "admin" em base64
  KEYCLOAK_ADMIN_PASSWORD: YWRtaW4=   # "admin" em base64
