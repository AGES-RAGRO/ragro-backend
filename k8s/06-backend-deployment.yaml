apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: ragro
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z postgres-service 5432; do sleep 3; done
      containers:
      - name: backend
        image: ragro-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: SPRING_JPA_HIBERNATE_DDL_AUTO
        - name: KEYCLOAK_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: KEYCLOAK_SERVER_URL
        - name: KEYCLOAK_PUBLIC_URL
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: KEYCLOAK_PUBLIC_URL
        - name: KEYCLOAK_ISSUER_URI
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: KEYCLOAK_ISSUER_URI
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: app-configmap
              key: KEYCLOAK_JWK_SET_URI
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ragro
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
